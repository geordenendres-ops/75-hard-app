<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="75 Hard">
<meta name="theme-color" content="#07070d">
<link rel="manifest" id="pwa-manifest">
<title>75 Hard Accountability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07070d;
  --surface:  #0d0d1a;
  --surface2: #141425;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #ededfa;
  --muted:    rgba(237,237,250,0.45);
  --dim:      rgba(237,237,250,0.2);
  --green:    #00e87a;
  --green-bg: rgba(0,232,122,0.12);
  --amber:    #ffb800;
  --amber-bg: rgba(255,184,0,0.12);
  --red:      #ff2d55;
  --red-bg:   rgba(255,45,85,0.12);
  --blue:     #4a9fff;
  --blue-bg:  rgba(74,159,255,0.12);
  --r:        16px;
  --r-sm:     10px;
  --tab:      72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100%;display:flex;justify-content:center;background:var(--bg)}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:env(safe-area-inset-top,44px) 18px 12px;background:rgba(7,7,13,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;letter-spacing:0.04em;text-transform:uppercase}
.hdr-logo em{color:var(--green);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-name{font-size:13px;color:var(--muted);font-weight:500;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 9px;border-radius:20px;flex-shrink:0}
.pill.on-track{background:var(--green-bg);color:var(--green)}
.pill.at-risk{background:var(--amber-bg);color:var(--amber);animation:pulse-a 1.8s ease infinite}
.pill.failed{background:var(--red-bg);color:var(--red);animation:pulse-r 1.8s ease infinite}
.pill.completed{background:var(--green-bg);color:var(--green)}
@keyframes pulse-a{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes pulse-r{0%,100%{opacity:1}50%{opacity:.55}}

/* SCROLL */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--tab) + env(safe-area-inset-bottom,16px) + 14px);scrollbar-width:none}
.content::-webkit-scrollbar{display:none}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}

/* HERO */
.hero{padding:18px 18px 14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 110% 0%,rgba(0,232,122,0.06) 0%,transparent 65%);pointer-events:none}
.hero-day{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.hero-num{font-family:'Barlow Condensed',sans-serif;font-size:62px;font-weight:900;line-height:1;letter-spacing:-0.02em}
.hero-num sub{font-size:22px;font-weight:600;color:var(--muted);vertical-align:middle}
.hero-right{position:absolute;right:18px;top:18px;text-align:right}
.hero-pct{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1}
.hero-pct-lbl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.hero-status{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.bar-bg{background:var(--surface2);border-radius:6px;height:5px;margin-top:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease}

/* TASK */
.task{display:flex;align-items:center;gap:14px;padding:15px;cursor:pointer;transition:background .12s;user-select:none;-webkit-user-select:none}
.task:active{background:var(--surface2)}
.chk{width:30px;height:30px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s ease}
.chk.done{background:var(--green);border-color:var(--green);color:#000}
.task-info{flex:1;min-width:0}
.task-name{font-size:15px;font-weight:600;margin-bottom:2px;transition:color .15s}
.task-name.done{color:var(--muted);text-decoration:line-through}
.task-meta{font-size:11px;color:var(--muted);line-height:1.4}
.task-icon{flex-shrink:0;font-size:18px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;letter-spacing:0.04em}
.badge.done{background:var(--green-bg);color:var(--green)}
.badge.todo{background:var(--blue-bg);color:var(--blue)}

/* WATER */
.water-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.water-lhs{display:flex;align-items:center;gap:10px}
.water-title{font-size:15px;font-weight:600}
.water-big{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;line-height:1}
.water-big sub{font-size:13px;font-weight:500;color:var(--muted);vertical-align:middle}
.water-rem{font-size:11px;color:var(--muted);margin-top:2px;text-align:right}
.wbar-bg{background:var(--surface2);border-radius:8px;height:10px;margin-bottom:12px;overflow:hidden}
.wbar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#4a9fff 0%,#00e87a 100%);transition:width .35s ease}
.w-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.w-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 0;cursor:pointer;transition:all .12s;text-align:center}
.w-btn:active{background:var(--blue-bg);border-color:var(--blue)}
.w-btn.rst{color:var(--red);font-size:12px}

/* WHATS LEFT */
.wl-title{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.wl-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);padding:3px 0}
.wl-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0}
.done-msg{font-size:14px;font-weight:600;color:var(--green)}

/* COUNTDOWN */
.cdown{text-align:center;padding:20px}
.cdown-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.cdown-time{font-family:'Barlow Condensed',sans-serif;font-size:56px;font-weight:900;line-height:1;letter-spacing:0.01em}
.cdown-sub{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;padding-left:2px}

/* CREW CARDS */
.crew-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.crew-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
.you-tag{font-size:9px;background:var(--blue-bg);color:var(--blue);padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0.06em}
.crew-pct{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1}
.crew-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:3px 0}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* INVITE */
.invite{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:10px}
.invite-sub{font-size:13px;color:var(--muted);margin-bottom:10px}
.invite-code{background:var(--surface2);border-radius:8px;padding:10px 14px;font-family:monospace;font-size:20px;letter-spacing:.2em;color:var(--green);font-weight:700}
.invite-note{font-size:11px;color:var(--dim);margin-top:8px}

/* SETTINGS */
.s-section{margin-bottom:22px}
.s-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;padding-left:2px}
.s-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.s-row-lbl{font-size:15px;font-weight:500}
.s-row-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* SETUP / AUTH */
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 24px;text-align:center;overflow-y:auto}
.setup-logo{font-family:'Barlow Condensed',sans-serif;font-size:80px;font-weight:900;letter-spacing:-.02em;line-height:.88;margin-bottom:6px}
.setup-logo em{color:var(--green);font-style:normal}
.setup-sub{font-size:15px;color:var(--muted);margin-bottom:36px;line-height:1.6;max-width:280px}
.setup-form{width:100%;max-width:340px;text-align:left}
.field-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:16px}
.field{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s;margin-bottom:2px}
.field:focus{border-color:var(--green)}
.field-hint{font-size:11px;color:var(--dim);margin-bottom:4px}
.go-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:var(--r-sm);padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:20px;transition:opacity .15s,transform .1s}
.go-btn:active{opacity:.85;transform:scale(.98)}
.go-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.err{color:var(--red);font-size:12px;margin-top:8px;padding-left:2px}
.link-btn{background:none;border:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}

/* TAB BAR */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,7,13,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,10px);height:var(--tab);z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;color:var(--dim);transition:color .15s;padding-top:8px;font-family:'DM Sans',sans-serif}
.tab-btn.active{color:var(--green)}
.tab-btn svg{width:22px;height:22px}
.tab-btn span{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}

/* SPINNER */
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* REALTIME BADGE */
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .28s ease both}
.footer-note{text-align:center;font-size:11px;color:var(--dim);padding:12px 0 4px;line-height:1.9}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ════════════════════════════════════════════════════════
   ⚠️  PASTE YOUR SUPABASE CREDENTIALS HERE
════════════════════════════════════════════════════════ */
const SUPABASE_URL      = 'https://ypiopcvcqhilvostlvri.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwaW9wY3ZjcWhpbHZvc3RsdnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTAzMjgsImV4cCI6MjA5MDEyNjMyOH0.YuDAqtayMt4thY29UZVW193AjrhwMPDHmFcE8L8qcGs';
/* ════════════════════════════════════════════════════════ */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── UTILITIES ── */
function getETNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
}
function getTodayKey() {
  const et = getETNow();
  return [et.getFullYear(), String(et.getMonth()+1).padStart(2,'0'), String(et.getDate()).padStart(2,'0')].join('-');
}
function getCurrentDay(startDate) {
  if (!startDate) return 1;
  const start = new Date(startDate + 'T00:00:00');
  start.setHours(0,0,0,0);
  const today = getETNow();
  today.setHours(0,0,0,0);
  const diff = Math.round((today - start) / 86400000) + 1;
  return Math.min(Math.max(diff, 1), 75);
}
function getMinsUntilMidnight() {
  const et = getETNow();
  return (23 - et.getHours()) * 60 + (60 - et.getMinutes()) - 1;
}
function defaultProgress() {
  return { workout1:false, workout2:false, water_oz:0, reading:false, clean_eating:false };
}
function getPct(p) {
  if (!p) return 0;
  const done = [p.workout1, p.workout2, (p.water_oz||0) >= 128, p.reading, p.clean_eating].filter(Boolean).length;
  return Math.round((done / 5) * 100);
}
function getStatus(p) {
  if (!p) return 'on-track';
  if (p.workout1 && p.workout2 && (p.water_oz||0) >= 128 && p.reading && p.clean_eating) return 'completed';
  const mins = getMinsUntilMidnight();
  let needed = 0;
  if (!p.workout1) needed += 45;
  if (!p.workout2) needed += 45;
  if (!p.reading)  needed += 20;
  if (needed > mins) return 'failed';
  const etH = getETNow().getHours();
  if (mins < 240 && (needed > 0 || (p.water_oz||0) < 128)) return 'at-risk';
  if (etH >= 18   && (needed > 0 || (p.water_oz||0) < 128)) return 'at-risk';
  return 'on-track';
}
function fmtCountdown(totalMins) {
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  return h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
}
const STATUS_LABEL = { 'on-track':'On Track','at-risk':'At Risk','failed':'Failed','completed':'Completed' };
const STATUS_COLOR = { 'on-track':'var(--green)','at-risk':'var(--amber)','failed':'var(--red)','completed':'var(--green)' };

/* ── LOADING ── */
function LoadingScreen() {
  return (
    <div style={{ display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:20 }}>
      <div className="setup-logo" style={{ fontSize:60 }}>75<br/><em>HARD</em></div>
      <div className="spinner"/>
    </div>
  );
}

/* ── AUTH — OTP code (stays inside PWA, no redirect) ── */
function AuthScreen() {
  const [email, setEmail] = useState('');
  const [code,  setCode]  = useState('');
  const [step,  setStep]  = useState('email'); // 'email' | 'code'
  const [busy,  setBusy]  = useState(false);
  const [error, setError] = useState('');

  async function sendCode() {
    if (!email.trim()) return;
    setBusy(true); setError('');
    const { error: e } = await sb.auth.signInWithOtp({
      email: email.trim(),
      options: { shouldCreateUser: true }
    });
    if (e) { setError(e.message); setBusy(false); }
    else { setStep('code'); setBusy(false); }
  }

  async function verifyCode() {
    if (!code.trim()) return;
    setBusy(true); setError('');
    const { error: e } = await sb.auth.verifyOtp({
      email: email.trim(),
      token: code.trim(),
      type: 'email'
    });
    if (e) { setError('Invalid code. Check your email and try again.'); setBusy(false); }
    // on success the onAuthStateChange listener in App handles the rest
  }

  if (step === 'code') return (
    <div className="setup">
      <div className="setup-logo">75<br/><em>HARD</em></div>
      <p className="setup-sub">
        We sent a 6-digit code to<br/>
        <strong style={{ color:'var(--text)' }}>{email}</strong>
      </p>
      <div className="setup-form">
        <div className="field-lbl">Enter your code</div>
        <input className="field" type="number" placeholder="123456" value={code}
          onChange={e => setCode(e.target.value)}
          onKeyDown={e => e.key==='Enter' && verifyCode()}
          style={{ letterSpacing:'.3em', fontSize:28, textAlign:'center', fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700 }}
          autoFocus/>
        <div className="field-hint">Check your email — code expires in 10 minutes</div>
        {error && <div className="err">{error}</div>}
        <button className="go-btn" style={{ opacity:code.trim()&&!busy?1:.4 }}
          onClick={verifyCode} disabled={!code.trim()||busy}>
          {busy ? 'Verifying…' : 'Sign In →'}
        </button>
        <div style={{ textAlign:'center', marginTop:16 }}>
          <button className="link-btn" onClick={() => { setStep('email'); setCode(''); setError(''); }}>
            ← Use a different email
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="setup">
      <div className="setup-logo">75<br/><em>HARD</em></div>
      <p className="setup-sub">Your personal accountability coach.<br/>75 days. No excuses. Let's go.</p>
      <div className="setup-form">
        <div className="field-lbl">Your Email</div>
        <input className="field" type="email" placeholder="you@example.com" value={email}
          onChange={e => setEmail(e.target.value)}
          onKeyDown={e => e.key==='Enter' && sendCode()} autoFocus/>
        <div className="field-hint">We'll send a 6-digit code — no password, no redirects</div>
        {error && <div className="err">{error}</div>}
        <button className="go-btn" style={{ opacity:email.trim()&&!busy?1:.4 }}
          onClick={sendCode} disabled={!email.trim()||busy}>
          {busy ? 'Sending…' : 'Send Code'}
        </button>
      </div>
    </div>
  );
}

/* ── PROFILE SETUP (first login only) ── */
function ProfileSetupScreen({ user, onDone }) {
  const [name, setName]           = useState('');
  const [startDate, setStartDate] = useState('');
  const [busy, setBusy]           = useState(false);
  const [error, setError]         = useState('');
  const today = getETNow().toISOString().split('T')[0];

  async function save() {
    if (!name.trim()) return;
    setBusy(true); setError('');
    const { data, error: e } = await sb.from('profiles').insert({
      id: user.id,
      display_name: name.trim(),
      challenge_start_date: startDate || today
    }).select().single();
    if (e) { setError(e.message); setBusy(false); }
    else onDone(data);
  }

  return (
    <div className="setup">
      <div className="setup-logo">75<br/><em>HARD</em></div>
      <p className="setup-sub">Let's set up your challenge.</p>
      <div className="setup-form">
        <div className="field-lbl">Your Name</div>
        <input className="field" placeholder="What should we call you?" value={name}
          onChange={e => setName(e.target.value)} autoFocus/>
        <div className="field-lbl" style={{ marginTop:16 }}>Challenge Start Date</div>
        <input className="field" type="date" value={startDate} max={today}
          onChange={e => setStartDate(e.target.value)}/>
        <div className="field-hint">Leave blank to start today</div>
        {error && <div className="err">{error}</div>}
        <button className="go-btn" style={{ opacity:name.trim()&&!busy?1:.4 }}
          onClick={save} disabled={!name.trim()||busy}>
          {busy ? 'Saving…' : 'Continue →'}
        </button>
      </div>
    </div>
  );
}

/* ── CREW SETUP ── */
function CrewSetupScreen({ user, onDone }) {
  const [mode, setMode]             = useState(null); // null | 'create' | 'join'
  const [crewName, setCrewName]     = useState('');
  const [code, setCode]             = useState('');
  const [busy, setBusy]             = useState(false);
  const [error, setError]           = useState('');

  async function createCrew() {
    if (!crewName.trim()) return;
    setBusy(true); setError('');
    const { data: crew, error: e1 } = await sb.from('crews')
      .insert({ name: crewName.trim(), created_by: user.id })
      .select().single();
    if (e1) { setError(e1.message); setBusy(false); return; }
    const { error: e2 } = await sb.from('crew_members')
      .insert({ crew_id: crew.id, user_id: user.id });
    if (e2) { setError(e2.message); setBusy(false); return; }
    onDone(crew);
  }

  async function joinCrew() {
    if (!code.trim()) return;
    setBusy(true); setError('');
    const { data: crew, error: e1 } = await sb.from('crews')
      .select('*').eq('invite_code', code.trim().toUpperCase()).maybeSingle();
    if (e1 || !crew) { setError('Crew not found. Double-check the code.'); setBusy(false); return; }
    // idempotent insert
    await sb.from('crew_members').upsert({ crew_id: crew.id, user_id: user.id });
    onDone(crew);
  }

  if (!mode) return (
    <div className="setup">
      <div className="setup-logo">75<br/><em>HARD</em></div>
      <p className="setup-sub">Accountability is better with a crew.<br/>Create one or join a friend's.</p>
      <div className="setup-form">
        <button className="go-btn" style={{ marginTop:0 }} onClick={() => setMode('create')}>Create a Crew</button>
        <button className="go-btn secondary" onClick={() => setMode('join')}>Join with Invite Code</button>
        <div style={{ textAlign:'center', marginTop:20 }}>
          <button className="link-btn" onClick={() => onDone(null)}>Skip for now</button>
        </div>
      </div>
    </div>
  );

  if (mode === 'create') return (
    <div className="setup">
      <div className="setup-logo">75<br/><em>HARD</em></div>
      <p className="setup-sub">Name your crew.</p>
      <div className="setup-form">
        <div className="field-lbl">Crew Name</div>
        <input className="field" placeholder="e.g. The Grind Squad" value={crewName}
          onChange={e => setCrewName(e.target.value)} autoFocus/>
        {error && <div className="err">{error}</div>}
        <button className="go-btn" style={{ opacity:crewName.trim()&&!busy?1:.4 }}
          onClick={createCrew} disabled={!crewName.trim()||busy}>
          {busy ? 'Creating…' : 'Create Crew'}
        </button>
        <div style={{ textAlign:'center', marginTop:16 }}>
          <button className="link-btn" onClick={() => { setMode(null); setError(''); }}>← Back</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="setup">
      <div className="setup-logo">75<br/><em>HARD</em></div>
      <p className="setup-sub">Enter the invite code your friend shared.</p>
      <div className="setup-form">
        <div className="field-lbl">Invite Code</div>
        <input className="field" placeholder="XXXXXXXX" value={code}
          onChange={e => setCode(e.target.value.toUpperCase())} autoFocus
          style={{ letterSpacing:'.2em', fontFamily:'monospace', fontSize:20 }}/>
        {error && <div className="err">{error}</div>}
        <button className="go-btn" style={{ opacity:code.trim()&&!busy?1:.4 }}
          onClick={joinCrew} disabled={!code.trim()||busy}>
          {busy ? 'Joining…' : 'Join Crew'}
        </button>
        <div style={{ textAlign:'center', marginTop:16 }}>
          <button className="link-btn" onClick={() => { setMode(null); setError(''); }}>← Back</button>
        </div>
      </div>
    </div>
  );
}

/* ── SHARED UI ── */
const Check = () => (
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);

function TaskCard({ emoji, name, meta, done, onToggle, delay=0 }) {
  return (
    <div className="card fade-in" style={{ animationDelay:`${delay}ms` }}>
      <div className="task" onClick={onToggle}>
        <div className={`chk${done?' done':''}`}>{done && <Check/>}</div>
        <div className="task-info">
          <div className={`task-name${done?' done':''}`}>{name}</div>
          {meta && <div className="task-meta">{meta}</div>}
        </div>
        <span className="task-icon">{emoji}</span>
        <span className={`badge${done?' done':' todo'}`}>{done ? '✓ Done' : 'Pending'}</span>
      </div>
    </div>
  );
}

function WaterCard({ oz, onAdd, onReset }) {
  const pct  = Math.min((oz / 128) * 100, 100);
  const done = oz >= 128;
  return (
    <div className="card fade-in" style={{ animationDelay:'80ms', padding:'15px' }}>
      <div className="water-hdr">
        <div className="water-lhs"><span style={{ fontSize:20 }}>💧</span><span className="water-title">Water</span></div>
        <div style={{ textAlign:'right' }}>
          <div className="water-big" style={{ color:done?'var(--green)':'var(--text)' }}>{oz}<sub> / 128 oz</sub></div>
          <div className="water-rem">{done ? '✓ Goal reached!' : `${128-oz} oz left`}</div>
        </div>
      </div>
      <div className="wbar-bg"><div className="wbar-fill" style={{ width:`${pct}%` }}/></div>
      <div className="w-btns">
        {[8,16,32].map(a => <button key={a} className="w-btn" onClick={() => onAdd(a)}>+{a} oz</button>)}
        <button className="w-btn rst" onClick={onReset}>Reset</button>
      </div>
    </div>
  );
}

function HeroCard({ day, pct, status }) {
  const color = STATUS_COLOR[status];
  return (
    <div className="card hero fade-in">
      <div className="hero-day">Challenge Progress</div>
      <div className="hero-num" style={{ color }}>{day}<sub> / 75</sub></div>
      <div className="hero-right">
        <div className="hero-pct" style={{ color }}>{pct}%</div>
        <div className="hero-pct-lbl">Today</div>
        <div className="hero-status" style={{ background:`${color}1a`, color }}>{STATUS_LABEL[status]}</div>
      </div>
      <div className="bar-bg"><div className="bar-fill" style={{ width:`${pct}%`, background:color }}/></div>
    </div>

function WhatsLeft({ p }) {
  const items = [];
  if (!p.workout1)         items.push('Workout 1 — 45 min');
  if (!p.workout2)         items.push('Workout 2 — 45 min');
  if ((p.water_oz||0)<128) items.push(`Water — ${128-(p.water_oz||0)} oz remaining`);
  if (!p.reading)          items.push('Reading — 10 pages / 20 min audiobook');
  if (!p.clean_eating)     items.push('Clean Eating & No Bad Habits');
  return (
    <div className="card fade-in" style={{ padding:'15px', animationDelay:'160ms' }}>
      <div className="wl-title">What's Left Today</div>
      {items.length === 0
        ? <div className="done-msg">🎉 All done! Day complete.</div>
        : items.map((it,i) => <div key={i} className="wl-item"><div className="wl-dot"/><span>{it}</span></div>)
      }
    </div>
  );
}

function CountdownCard({ status }) {
  const [mins, setMins] = useState(getMinsUntilMidnight());
  useEffect(() => {
    const id = setInterval(() => setMins(getMinsUntilMidnight()), 20000);
    return () => clearInterval(id);
  }, []);
  const color = status==='failed'?'var(--red)':status==='completed'?'var(--green)':'var(--amber)';
  const msgs  = {
    failed:    '⛔ Not enough time remaining. This day is a loss — reset tomorrow.',
    completed: '✅ Day complete! Enjoy your evening.',
    'at-risk': '⚠️ Getting tight. Finish your remaining tasks now.',
    'on-track':'Stay disciplined. You have time — use it wisely.',
  };
  return (
    <div className="card fade-in" style={{ borderColor:color, animationDelay:'200ms' }}>
      <div className="cdown">
        <div className="cdown-lbl">Until Midnight ET</div>
        <div className="cdown-time" style={{ color }}>{fmtCountdown(mins)}</div>
        <div className="cdown-sub">{msgs[status]}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
function App() {
  // 'loading' | 'unauthenticated' | 'setup-profile' | 'setup-crew' | 'ready'
  const [screen,    setScreen]    = useState('loading');
  const [user,      setUser]      = useState(null);
  const [profile,   setProfile]   = useState(null);
  const [crew,      setCrew]      = useState(null);
  const [progress,  setProgress]  = useState(defaultProgress());
  const [crewData,  setCrewData]  = useState([]);
  const [tab,       setTab]       = useState('myday');
  const saveTimer = useRef(null);

  // ── Auth listener
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) bootstrap(session.user);
      else setScreen('unauthenticated');
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session) bootstrap(session.user);
      else { setUser(null); setProfile(null); setCrew(null); setScreen('unauthenticated'); }
    });
    return () => subscription.unsubscribe();
  }, []);

  // ── Load everything for this user
  async function bootstrap(u) {
    setUser(u);

    // Profile
    const { data: prof } = await sb.from('profiles').select('*').eq('id', u.id).maybeSingle();
    if (!prof) { setScreen('setup-profile'); return; }
    setProfile(prof);

    // Crew membership
    const { data: mem } = await sb.from('crew_members')
      .select('crew_id, crews(*)').eq('user_id', u.id).maybeSingle();
    const c = mem?.crews || null;
    setCrew(c);

    // Today's progress
    const { data: prog } = await sb.from('daily_progress')
      .select('*').eq('user_id', u.id).eq('date', getTodayKey()).maybeSingle();
    setProgress(prog || defaultProgress());

    // Crew progress
    if (c) await fetchCrewProgress(c.id);

    setScreen('ready');
  }

  // ── Fetch all crew members + their progress for today
  async function fetchCrewProgress(crewId) {
    const { data: members } = await sb.from('crew_members')
      .select('user_id').eq('crew_id', crewId);
    if (!members?.length) return;

    const ids = members.map(m => m.user_id);

    const [{ data: profiles }, { data: progresses }] = await Promise.all([
      sb.from('profiles').select('*').in('id', ids),
      sb.from('daily_progress').select('*').in('user_id', ids).eq('date', getTodayKey())
    ]);

    const combined = (profiles || []).map(p => ({
      ...p,
      progress: (progresses || []).find(pr => pr.user_id === p.id) || defaultProgress()
    }));
    setCrewData(combined);
  }

  // ── Save progress to Supabase (debounced 800ms)
  async function handleUpdate(newProg) {
    setProgress(newProg);
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      await sb.from('daily_progress').upsert({
        user_id:         user.id,
        date:            getTodayKey(),
        workout1:        newProg.workout1,
        workout2:        newProg.workout2,
        water_oz:        newProg.water_oz || 0,
        reading:         newProg.reading,
        clean_eating:    newProg.clean_eating,
        completion_pct:  getPct(newProg),
        day_status:      getStatus(newProg),
        updated_at:      new Date().toISOString()
      }, { onConflict: 'user_id,date' });
    }, 800);
  }

  // ── Restart challenge
  async function handleRestartChallenge() {
    if (!window.confirm('Restart your 75 Hard challenge? This resets your start date to today and clears today\'s progress. Your crew stays the same.')) return;
    const today = getTodayKey();
    await Promise.all([
      sb.from('profiles').update({ challenge_start_date: today }).eq('id', user.id),
      sb.from('daily_progress').delete().eq('user_id', user.id).eq('date', today)
    ]);
    setProgress(defaultProgress());
    setProfile(p => ({ ...p, challenge_start_date: today }));
    setTab('myday');
    window.alert('Challenge restarted! Day 1 begins today. 💪');
  }

  // ── After crew setup
  async function onCrewDone(newCrew) {
    setCrew(newCrew);
    if (newCrew) await fetchCrewProgress(newCrew.id);
    setScreen('ready');
  }

  // ── Screens
  if (screen === 'loading')       return <div className="app"><LoadingScreen/></div>;
  if (screen === 'unauthenticated') return <div className="app"><AuthScreen/></div>;
  if (screen === 'setup-profile') return (
    <div className="app">
      <ProfileSetupScreen user={user} onDone={p => { setProfile(p); setScreen('setup-crew'); }}/>
    </div>
  );
  if (screen === 'setup-crew') return (
    <div className="app">
      <CrewSetupScreen user={user} onDone={onCrewDone}/>
    </div>
  );

  // ── Main app
  const currentDay = getCurrentDay(profile?.challenge_start_date);
  const status     = getStatus(progress);
  const TABS = [{ id:'myday', label:'My Day' }, { id:'crew', label:'Crew' }, { id:'settings', label:'Settings' }];

  return (
    <div className="app">
      <header className="hdr">
        <div className="hdr-logo">75 <em>Hard</em></div>
        <div className="hdr-right">
          <span className="hdr-name">{profile?.display_name}</span>
          <span className={`pill ${status}`}>{STATUS_LABEL[status]}</span>
        </div>
      </header>

      {tab==='myday' && (
        <MyDayTab progress={progress} onUpdate={handleUpdate} currentDay={currentDay}/>
      )}
      {tab==='crew' && (
        <CrewTab userId={user.id} crew={crew} crewData={crewData} currentDay={currentDay}
          onRefresh={() => crew && fetchCrewProgress(crew.id)}/>
      )}
      {tab==='settings' && (
        <SettingsTab profile={profile} crew={crew} currentDay={currentDay}
          onJoinCrew={() => setScreen('setup-crew')}
          onRestartChallenge={handleRestartChallenge}/>
      )}

      <nav className="tabbar">
        {TABS.map(t => (
          <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={() => setTab(t.id)}>
            <TabIcon id={t.id}/>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// PWA Manifest
const manifest = {
  name:"75 Hard Accountability", short_name:"75 Hard", start_url:"./", display:"standalone",
  background_color:"#07070d", theme_color:"#07070d",
  description:"Personal accountability coach and crew tracker for 75 Hard.",
  icons:[{ src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%2307070d'/%3E%3Ctext x='50%25' y='58%25' font-family='Arial Black' font-weight='900' font-size='80' fill='%2300e87a' text-anchor='middle' dominant-baseline='middle'%3E75%3C/text%3E%3C/svg%3E", sizes:"192x192", type:"image/svg+xml", purpose:"any maskable" }]
};
const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

// Service Worker — skip Supabase calls from cache
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE='75hard-v2';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('supabase.co')||e.request.url.includes('fonts.g'))return;
      e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        if(e.request.method==='GET')c.put(e.request,res.clone());return res;
      }))));
    });
  `;
  const swBlob = new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'./'}).catch(()=>{});
}
</script>
